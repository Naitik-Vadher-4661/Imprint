sonar.projectKey=imprint-app
sonar.projectName=Imprint
sonar.organization=imprint-org
sonar.sourceEncoding=UTF-8

# Source files
sonar.sources=apps/api/src, apps/web/src

# Exclude node_modules, build outputs, and tests from source analysis
sonar.exclusions=**/node_modules/**, **/.next/**, **/dist/**, **/__tests__/**, **/*.test.ts, **/*.test.tsx, **/coverage/**

# Test files configuration
sonar.tests=apps/api/src
sonar.test.inclusions=**/__tests__/**, **/*.test.ts, **/*.test.tsx

# TypeScript / JavaScript Settings
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info, apps/web/coverage/lcov.info
